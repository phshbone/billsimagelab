<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bill's Image Lab — Build 2 Shell</title>
<style>
  :root {
    --bg: #0b1024;
    --bg-2: #111936;
    --panel: #141d3d;
    --panel-2: #19244a;
    --panel-3: #202c59;
    --line: rgba(255,255,255,.12);
    --line-strong: rgba(255,255,255,.22);
    --text: #f3f6ff;
    --muted: #aeb8d6;
    --soft: #7e8bb3;
    --accent: #77b7ff;
    --accent-2: #b6dcff;
    --good: #77f2b3;
    --warn: #ffd36e;
    --danger: #ff7777;
    --shadow: 0 20px 60px rgba(0,0,0,.35);
    --radius: 18px;
    --rail: 76px;
    --panel-width: 342px;
    --mobile-bar: 76px;
    --drawer-height: 46dvh;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at top, #152153 0, var(--bg) 48%, #070b19 100%);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button, input, select {
    font: inherit;
  }

  button {
    color: inherit;
    border: 0;
    cursor: pointer;
  }

  .app {
    width: 100%;
    height: 100dvh;
    display: grid;
    grid-template-columns: var(--rail) minmax(0, 1fr) var(--panel-width);
    grid-template-rows: 1fr;
  }

  .rail {
    border-right: 1px solid var(--line);
    background: rgba(8, 13, 32, .82);
    backdrop-filter: blur(18px);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 10px;
    gap: 12px;
    z-index: 10;
  }

  .brand {
    width: 52px;
    height: 52px;
    border-radius: 17px;
    display: grid;
    place-items: center;
    background: linear-gradient(145deg, #203064, #111935);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 12px 28px rgba(0,0,0,.24);
    font-weight: 900;
    letter-spacing: -.04em;
    color: var(--accent-2);
  }

  .studio-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    align-items: center;
  }

  .studio-btn {
    width: 56px;
    height: 58px;
    border-radius: 18px;
    display: grid;
    place-items: center;
    background: transparent;
    border: 1px solid transparent;
    position: relative;
    transition: transform .16s ease, background .16s ease, border-color .16s ease;
  }

  .studio-btn:hover {
    background: rgba(255,255,255,.07);
  }

  .studio-btn.active {
    background: linear-gradient(150deg, rgba(119,183,255,.24), rgba(255,255,255,.08));
    border-color: rgba(119,183,255,.45);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
  }

  .studio-btn .icon {
    font-size: 25px;
    line-height: 1;
  }

  .studio-btn .tip {
    position: absolute;
    left: 66px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
    background: #080d20;
    color: var(--text);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    padding: 8px 10px;
    font-size: 13px;
    box-shadow: var(--shadow);
    transition: opacity .12s ease;
  }

  .studio-btn:hover .tip { opacity: 1; }

  .rail-footer {
    margin-top: auto;
    display: grid;
    gap: 10px;
  }

  .small-rail-btn {
    width: 48px;
    height: 48px;
    border-radius: 15px;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--line);
    color: var(--muted);
  }

  .workspace {
    min-width: 0;
    display: grid;
    grid-template-rows: 58px minmax(0, 1fr) 44px;
    position: relative;
  }

  .topbar {
    border-bottom: 1px solid var(--line);
    background: rgba(12, 18, 43, .7);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    gap: 12px;
  }

  .title {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }

  .title strong {
    font-size: 15px;
    letter-spacing: .01em;
  }

  .title span {
    font-size: 12px;
    color: var(--muted);
  }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pill-btn {
    border-radius: 999px;
    padding: 9px 13px;
    background: rgba(255,255,255,.07);
    border: 1px solid var(--line);
    color: var(--text);
    font-weight: 650;
    font-size: 13px;
  }

  .pill-btn.primary {
    background: linear-gradient(145deg, rgba(119,183,255,.9), rgba(182,220,255,.82));
    color: #071025;
    border-color: transparent;
  }

  .canvas-stage {
    min-width: 0;
    min-height: 0;
    position: relative;
    display: grid;
    place-items: center;
    padding: 24px;
    overflow: hidden;
  }

  .checker-wrap {
    width: min(82%, 980px);
    height: min(76%, 650px);
    min-height: 280px;
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,.16);
    background:
      linear-gradient(45deg, rgba(255,255,255,.06) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,.06) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,.06) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.06) 75%);
    background-size: 28px 28px;
    background-position: 0 0, 0 14px, 14px -14px, -14px 0;
    background-color: rgba(255,255,255,.03);
    box-shadow: 0 30px 80px rgba(0,0,0,.36);
    display: grid;
    place-items: center;
    overflow: hidden;
    position: relative;
  }

  .canvas-card {
    width: min(70%, 560px);
    aspect-ratio: 4 / 3;
    border-radius: 18px;
    background: linear-gradient(145deg, #f8fbff, #dfe7f6);
    color: #1a2747;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 26px;
    box-shadow: 0 26px 70px rgba(0,0,0,.32);
    position: relative;
  }

  .canvas-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
  }

  .canvas-card.has-image {
    background: transparent;
    box-shadow: none;
    width: 82%;
    height: 82%;
    aspect-ratio: auto;
  }

  .canvas-card.has-image img {
    display: block;
  }

  .canvas-card.has-image .empty-state {
    display: none;
  }

  .empty-state h1 {
    margin: 0 0 8px;
    font-size: clamp(24px, 4vw, 42px);
    letter-spacing: -.04em;
  }

  .empty-state p {
    margin: 0 auto 18px;
    color: #435070;
    max-width: 420px;
  }

  .statusbar {
    border-top: 1px solid var(--line);
    background: rgba(8, 13, 32, .68);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-size: 12px;
  }

  .panel {
    min-width: 0;
    border-left: 1px solid var(--line);
    background: rgba(14, 22, 50, .86);
    backdrop-filter: blur(18px);
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    z-index: 8;
  }

  .panel-head {
    padding: 18px;
    border-bottom: 1px solid var(--line);
  }

  .panel-head .eyebrow {
    color: var(--accent-2);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .13em;
    font-weight: 800;
  }

  .panel-head h2 {
    margin: 5px 0 4px;
    font-size: 24px;
    letter-spacing: -.04em;
  }

  .panel-head p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;
  }

  .panel-body {
    overflow: auto;
    padding: 16px;
  }

  .tool-group {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(255,255,255,.045);
    padding: 14px;
    margin-bottom: 14px;
  }

  .tool-group h3 {
    margin: 0 0 11px;
    font-size: 14px;
  }

  .tool-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
  }

  .tool-btn {
    min-height: 48px;
    border-radius: 14px;
    background: rgba(255,255,255,.07);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-weight: 700;
    font-size: 13px;
  }

  .tool-btn.full {
    grid-column: 1 / -1;
  }

  .tool-btn.disabled {
    opacity: .46;
    cursor: not-allowed;
  }

  .slider-row,
  .field-row {
    display: grid;
    gap: 7px;
    margin-top: 10px;
  }

  .slider-row label,
  .field-row label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  input[type="range"] {
    width: 100%;
  }

  .field {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(0,0,0,.22);
    color: var(--text);
    padding: 11px 12px;
    outline: none;
  }

  .hidden-file {
    display: none;
  }

  .mobile-studio-bar,
  .mobile-drawer {
    display: none;
  }

  .close-drawer {
    display: none;
  }

  .resize-handle {
    position: absolute;
    right: calc(var(--panel-width) - 6px);
    top: 58px;
    bottom: 44px;
    width: 12px;
    cursor: col-resize;
    z-index: 9;
  }

  .resize-handle::after {
    content: "";
    position: absolute;
    top: 50%;
    right: 4px;
    transform: translateY(-50%);
    width: 4px;
    height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,.14);
  }

  body.resizing {
    user-select: none;
    cursor: col-resize;
  }

  @media (max-width: 820px) {
    :root {
      --drawer-height: 48dvh;
    }

    .app {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 1fr) calc(var(--mobile-bar) + var(--safe-bottom));
    }

    .rail,
    .panel,
    .resize-handle {
      display: none;
    }

    .workspace {
      grid-template-rows: 52px minmax(0, 1fr) 34px;
      min-height: 0;
    }

    .topbar {
      padding: 0 12px;
    }

    .title strong {
      font-size: 14px;
    }

    .title span {
      display: none;
    }

    .top-actions .pill-btn:not(.primary) {
      display: none;
    }

    .canvas-stage {
      padding: 14px;
    }

    .checker-wrap {
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: 18px;
    }

    .canvas-card {
      width: 78%;
    }

    .statusbar {
      padding: 0 12px;
      font-size: 11px;
    }

    .mobile-studio-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px 10px calc(8px + var(--safe-bottom));
      border-top: 1px solid var(--line);
      background: rgba(8, 13, 32, .94);
      backdrop-filter: blur(18px);
      z-index: 20;
    }

    .mobile-studio-btn {
      height: 58px;
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      gap: 1px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 800;
    }

    .mobile-studio-btn .icon {
      font-size: 22px;
      line-height: 1;
    }

    .mobile-studio-btn.active {
      color: var(--text);
      background: linear-gradient(150deg, rgba(119,183,255,.22), rgba(255,255,255,.08));
      border-color: rgba(119,183,255,.46);
    }

    .mobile-drawer {
      display: block;
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(var(--mobile-bar) + var(--safe-bottom));
      max-height: var(--drawer-height);
      transform: translateY(calc(100% + var(--mobile-bar)));
      transition: transform .22s ease;
      background: rgba(14, 22, 50, .96);
      border-top: 1px solid var(--line-strong);
      border-radius: 24px 24px 0 0;
      z-index: 18;
      box-shadow: 0 -26px 70px rgba(0,0,0,.42);
      overflow: hidden;
    }

    .mobile-drawer.open {
      transform: translateY(0);
    }

    .drawer-grab {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      margin: 9px auto 2px;
    }

    .mobile-drawer .panel-head {
      padding: 10px 16px 14px;
      position: relative;
    }

    .mobile-drawer .panel-head h2 {
      font-size: 21px;
    }

    .mobile-drawer .panel-body {
      max-height: calc(var(--drawer-height) - 98px);
      padding: 14px;
    }

    .close-drawer {
      display: grid;
      place-items: center;
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border-radius: 13px;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--line);
      color: var(--text);
    }
  }

  @media (max-width: 430px) {
    .tool-grid {
      grid-template-columns: 1fr;
    }

    .tool-btn.full {
      grid-column: auto;
    }

    .empty-state h1 {
      font-size: 25px;
    }

    .empty-state p {
      font-size: 14px;
    }
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <aside class="rail" aria-label="Studio navigation">
      <div class="brand" aria-label="Bill's Image Lab">bil</div>
      <nav class="studio-buttons" id="desktopStudioButtons"></nav>
      <div class="rail-footer">
        <button class="small-rail-btn" title="Undo">↶</button>
        <button class="small-rail-btn" title="Redo">↷</button>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="title">
          <strong>bill's image lab</strong>
          <span id="taskLine">Choose a Studio, then work around the canvas.</span>
        </div>
        <div class="top-actions">
          <button class="pill-btn" id="fitBtn">Fit</button>
          <button class="pill-btn" id="clearBtn">Clear</button>
          <button class="pill-btn primary" id="uploadTopBtn">Import Image</button>
        </div>
      </header>

      <section class="canvas-stage" aria-label="Canvas workspace">
        <div class="checker-wrap" id="canvasWrap">
          <div class="canvas-card" id="canvasCard">
            <img id="previewImage" alt="Imported image preview" />
            <div class="empty-state">
              <h1>Canvas stays here.</h1>
              <p>Build 2 starts with the interface shell. Import an image or switch Studios to test the workflow.</p>
              <button class="pill-btn primary" id="uploadCanvasBtn">Import Image</button>
            </div>
          </div>
        </div>
      </section>

      <footer class="statusbar">
        <span id="statusStudio">Extract Studio ready</span>
        <span id="statusCanvas">No image loaded</span>
      </footer>
    </main>

    <div class="resize-handle" id="resizeHandle" title="Resize panel"></div>

    <aside class="panel" id="desktopPanel" aria-label="Studio tools"></aside>

    <nav class="mobile-studio-bar" id="mobileStudioButtons" aria-label="Mobile Studio navigation"></nav>

    <section class="mobile-drawer" id="mobileDrawer" aria-label="Mobile Studio drawer">
      <div class="drawer-grab"></div>
      <div id="mobilePanel"></div>
    </section>
  </div>

  <input class="hidden-file" id="fileInput" type="file" accept="image/*" />

<script>
(() => {
  const studios = {
    extract: {
      icon: "🪄",
      label: "Extract",
      eyebrow: "asset extraction",
      title: "Extract Studio",
      summary: "Remove backgrounds, crop, resize, and export transparent assets.",
      status: "Extract Studio ready",
      body: `
        <div class="tool-group">
          <h3>Start here</h3>
          <div class="tool-grid">
            <button class="tool-btn full" data-action="import">📥 Import Image</button>
            <button class="tool-btn">🪄 Magic Wand</button>
            <button class="tool-btn">⬜ Remove BG</button>
          </div>
        </div>
        <div class="tool-group">
          <h3>Clean up</h3>
          <div class="tool-grid">
            <button class="tool-btn">✂️ Crop</button>
            <button class="tool-btn">↔️ Resize</button>
          </div>
          <div class="slider-row">
            <label for="tolerance">Selection tolerance</label>
            <input id="tolerance" type="range" min="0" max="100" value="32" />
          </div>
        </div>
        <div class="tool-group">
          <h3>Export</h3>
          <div class="tool-grid">
            <button class="tool-btn full">⬇️ Transparent PNG</button>
          </div>
        </div>
      `
    },
    create: {
      icon: "✏️",
      label: "Create",
      eyebrow: "graphic creation",
      title: "Create Studio",
      summary: "Create original graphic elements with text, shapes, color, stroke, and shadow.",
      status: "Create Studio selected",
      body: `
        <div class="tool-group">
          <h3>Text</h3>
          <div class="field-row">
            <label for="textInput">Text content</label>
            <input class="field" id="textInput" value="bill's image lab" />
          </div>
          <div class="tool-grid" style="margin-top:10px;">
            <button class="tool-btn">T Add Text</button>
            <button class="tool-btn">Aa Font</button>
          </div>
        </div>
        <div class="tool-group">
          <h3>Style</h3>
          <div class="tool-grid">
            <button class="tool-btn">🎨 Color</button>
            <button class="tool-btn">▢ Stroke</button>
            <button class="tool-btn">☁ Shadow</button>
            <button class="tool-btn">✨ Glow</button>
          </div>
        </div>
        <div class="tool-group">
          <h3>Shapes</h3>
          <div class="tool-grid">
            <button class="tool-btn">▭ Rectangle</button>
            <button class="tool-btn">◯ Circle</button>
          </div>
        </div>
      `
    },
    compose: {
      icon: "🧩",
      label: "Compose",
      eyebrow: "finished artwork",
      title: "Compose Studio",
      summary: "Arrange assets, manage layers, align elements, and prepare the final export.",
      status: "Compose Studio selected",
      body: `
        <div class="tool-group">
          <h3>Layers</h3>
          <div class="tool-grid">
            <button class="tool-btn">⬆ Bring Up</button>
            <button class="tool-btn">⬇ Send Down</button>
            <button class="tool-btn">👁 Opacity</button>
            <button class="tool-btn">🔒 Lock</button>
          </div>
        </div>
        <div class="tool-group">
          <h3>Arrange</h3>
          <div class="tool-grid">
            <button class="tool-btn">↔ Scale</button>
            <button class="tool-btn">⟳ Rotate</button>
            <button class="tool-btn">☰ Align</button>
            <button class="tool-btn">⛓ Group</button>
          </div>
        </div>
        <div class="tool-group">
          <h3>Final</h3>
          <div class="tool-grid">
            <button class="tool-btn full">⬇ Export Artwork</button>
          </div>
        </div>
      `
    },
    effects: {
      icon: "🎭",
      label: "Effects",
      eyebrow: "parking lot",
      title: "Effects Studio",
      summary: "Reserved for later. Build 2 keeps advanced effects disabled while the interface is refined.",
      status: "Effects Studio parked",
      body: `
        <div class="tool-group">
          <h3>Future tools</h3>
          <div class="tool-grid">
            <button class="tool-btn disabled">Masks</button>
            <button class="tool-btn disabled">Blend Modes</button>
            <button class="tool-btn disabled">Healing</button>
            <button class="tool-btn disabled">Clone</button>
            <button class="tool-btn disabled">Perspective</button>
            <button class="tool-btn disabled">Liquify</button>
          </div>
        </div>
      `
    }
  };

  const state = {
    studio: "extract",
    drawerOpen: false,
    imageName: ""
  };

  const desktopButtons = document.getElementById("desktopStudioButtons");
  const mobileButtons = document.getElementById("mobileStudioButtons");
  const desktopPanel = document.getElementById("desktopPanel");
  const mobilePanel = document.getElementById("mobilePanel");
  const mobileDrawer = document.getElementById("mobileDrawer");
  const fileInput = document.getElementById("fileInput");
  const uploadTopBtn = document.getElementById("uploadTopBtn");
  const uploadCanvasBtn = document.getElementById("uploadCanvasBtn");
  const clearBtn = document.getElementById("clearBtn");
  const fitBtn = document.getElementById("fitBtn");
  const previewImage = document.getElementById("previewImage");
  const canvasCard = document.getElementById("canvasCard");
  const statusStudio = document.getElementById("statusStudio");
  const statusCanvas = document.getElementById("statusCanvas");
  const taskLine = document.getElementById("taskLine");
  const resizeHandle = document.getElementById("resizeHandle");

  function buildStudioButtons() {
    Object.entries(studios).forEach(([key, studio]) => {
      const d = document.createElement("button");
      d.className = "studio-btn";
      d.dataset.studio = key;
      d.innerHTML = `<span class="icon">${studio.icon}</span><span class="tip">${studio.title}</span>`;
      d.setAttribute("aria-label", studio.title);
      desktopButtons.appendChild(d);

      const m = document.createElement("button");
      m.className = "mobile-studio-btn";
      m.dataset.studio = key;
      m.innerHTML = `<span class="icon">${studio.icon}</span><span>${studio.label}</span>`;
      m.setAttribute("aria-label", studio.title);
      mobileButtons.appendChild(m);
    });
  }

  function panelTemplate(studio, mobile = false) {
    return `
      <div class="panel-head">
        ${mobile ? `<button class="close-drawer" id="closeDrawerBtn" aria-label="Close drawer">×</button>` : ""}
        <div class="eyebrow">${studio.eyebrow}</div>
        <h2>${studio.title}</h2>
        <p>${studio.summary}</p>
      </div>
      <div class="panel-body">${studio.body}</div>
    `;
  }

  function render() {
    const studio = studios[state.studio];

    document.querySelectorAll("[data-studio]").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.studio === state.studio);
    });

    desktopPanel.innerHTML = panelTemplate(studio, false);
    mobilePanel.innerHTML = panelTemplate(studio, true);
    statusStudio.textContent = studio.status;
    taskLine.textContent = `${studio.title}: ${studio.summary}`;

    document.querySelectorAll("[data-action='import']").forEach(btn => {
      btn.addEventListener("click", openFile);
    });

    const closeDrawerBtn = document.getElementById("closeDrawerBtn");
    if (closeDrawerBtn) closeDrawerBtn.addEventListener("click", closeDrawer);
  }

  function selectStudio(key) {
    if (!studios[key]) return;
    state.studio = key;
    render();

    if (window.matchMedia("(max-width: 820px)").matches) {
      openDrawer();
    }
  }

  function openDrawer() {
    state.drawerOpen = true;
    mobileDrawer.classList.add("open");
  }

  function closeDrawer() {
    state.drawerOpen = false;
    mobileDrawer.classList.remove("open");
  }

  function openFile() {
    fileInput.click();
  }

  function loadFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = event => {
      previewImage.src = event.target.result;
      canvasCard.classList.add("has-image");
      state.imageName = file.name;
      statusCanvas.textContent = file.name;
      closeDrawer();
    };
    reader.readAsDataURL(file);
  }

  function clearCanvas() {
    previewImage.removeAttribute("src");
    canvasCard.classList.remove("has-image");
    state.imageName = "";
    statusCanvas.textContent = "No image loaded";
  }

  function fitCanvas() {
    canvasCard.animate(
      [
        { transform: "scale(1)" },
        { transform: "scale(.985)" },
        { transform: "scale(1)" }
      ],
      { duration: 180, easing: "ease-out" }
    );
  }

  function setupEvents() {
    document.addEventListener("click", event => {
      const studioBtn = event.target.closest("[data-studio]");
      if (studioBtn) selectStudio(studioBtn.dataset.studio);
    });

    uploadTopBtn.addEventListener("click", openFile);
    uploadCanvasBtn.addEventListener("click", openFile);
    clearBtn.addEventListener("click", clearCanvas);
    fitBtn.addEventListener("click", fitCanvas);

    fileInput.addEventListener("change", event => {
      loadFile(event.target.files[0]);
      fileInput.value = "";
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeDrawer();
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "o") {
        event.preventDefault();
        openFile();
      }
    });

    mobileDrawer.addEventListener("click", event => {
      if (event.target === mobileDrawer) closeDrawer();
    });

    let startX = 0;
    let startWidth = 0;

    resizeHandle.addEventListener("pointerdown", event => {
      startX = event.clientX;
      startWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--panel-width"), 10);
      document.body.classList.add("resizing");
      resizeHandle.setPointerCapture(event.pointerId);
    });

    resizeHandle.addEventListener("pointermove", event => {
      if (!document.body.classList.contains("resizing")) return;
      const delta = startX - event.clientX;
      const next = Math.max(280, Math.min(520, startWidth + delta));
      document.documentElement.style.setProperty("--panel-width", `${next}px`);
    });

    resizeHandle.addEventListener("pointerup", event => {
      document.body.classList.remove("resizing");
      resizeHandle.releasePointerCapture(event.pointerId);
    });
  }

  buildStudioButtons();
  setupEvents();
  render();
})();
</script>
</body>
</html>
