<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#090f2b" />
<title>bill's image lab — build 6.7 pan zoom fix</title>
<style>
  :root {
    --bg:#090f2b;
    --panel:#111a3f;
    --panel2:#162152;
    --ink:#f7f9ff;
    --muted:#aeb9dd;
    --line:rgba(255,255,255,.14);
    --line2:rgba(255,255,255,.24);
    --accent:#75d7ff;
    --accent2:#b983ff;
    --good:#7dffa8;
    --shadow:0 24px 70px rgba(0,0,0,.38);
    --rail:76px;
    --panelWidth:370px;
    --mobileBar:76px;
    --drawerHeight:48dvh;
    --safeBottom:env(safe-area-inset-bottom,0px);
  }

  *{box-sizing:border-box}
  html,body{
    width:100%;height:100%;margin:0;overflow:hidden;
    background:radial-gradient(circle at top left,#182663 0,#090f2b 42%,#050817 100%);
    color:var(--ink);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  button,input,select{font:inherit}
  button{color:inherit;border:0;cursor:pointer}

  .app{
    width:100%;height:100dvh;
    display:grid;
    grid-template-columns:var(--rail) minmax(0,1fr) var(--panelWidth);
  }

  .rail{
    border-right:1px solid var(--line);
    background:rgba(5,8,23,.78);
    backdrop-filter:blur(16px);
    padding:14px 10px;
    display:flex;flex-direction:column;align-items:center;gap:12px;z-index:10;
  }

  .brand{
    width:52px;height:52px;border-radius:17px;display:grid;place-items:center;
    background:linear-gradient(135deg,rgba(117,215,255,.26),rgba(185,131,255,.22));
    border:1px solid rgba(117,215,255,.34);
    font-weight:950;letter-spacing:-.05em;color:#dff5ff;
  }

  .studioBtns{display:flex;flex-direction:column;gap:10px;width:100%;align-items:center}
  .studioBtn{
    width:56px;height:58px;border-radius:18px;background:rgba(255,255,255,.04);
    border:1px solid transparent;display:grid;place-items:center;position:relative;
  }
  .studioBtn.active{
    background:linear-gradient(135deg,rgba(117,215,255,.20),rgba(185,131,255,.14));
    border-color:rgba(117,215,255,.42);
  }
  .studioIcon{
    width:32px;height:32px;border-radius:12px;display:grid;place-items:center;
    background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.12);
    filter:grayscale(1);font-size:18px;
  }
  .tip{
    position:absolute;left:66px;top:50%;transform:translateY(-50%);
    opacity:0;pointer-events:none;white-space:nowrap;background:#070b1c;
    border:1px solid var(--line2);border-radius:12px;padding:8px 10px;font-size:13px;
  }
  .studioBtn:hover .tip{opacity:1}

  .workspace{
    min-width:0;
    display:grid;
    grid-template-rows:58px minmax(0,1fr) 44px;
    position:relative;
  }

  .topbar{
    border-bottom:1px solid var(--line);
    background:rgba(5,8,23,.70);
    backdrop-filter:blur(16px);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;gap:12px;
  }

  .title{display:flex;flex-direction:column;min-width:0}
  .titleLine{display:flex;align-items:center;gap:10px;min-width:0}
  .title strong{font-size:15px;text-transform:lowercase;letter-spacing:.01em}
  .buildBadge{
    font-size:11px;font-weight:900;color:#061022;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:999px;padding:3px 8px;white-space:nowrap;
  }
  .title span{
    font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .topActions{display:flex;gap:8px;align-items:center}
  .pill{
    border-radius:999px;min-height:38px;padding:8px 13px;
    border:1px solid var(--line);background:rgba(255,255,255,.07);
    color:var(--ink);font-weight:750;font-size:13px;
  }
  .pill.primary{
    background:linear-gradient(135deg,rgba(117,215,255,.92),rgba(185,131,255,.72));
    color:#071025;border-color:transparent;
  }

  .canvasStage{
    min-width:0;min-height:0;position:relative;
    overflow:scroll;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px;
    scroll-padding:32px;
    scrollbar-gutter:stable both-edges;
  }

  .canvasStage::-webkit-scrollbar{
    width:14px;
    height:14px;
  }

  .canvasStage::-webkit-scrollbar-track{
    background:rgba(255,255,255,.06);
    border-radius:999px;
  }

  .canvasStage::-webkit-scrollbar-thumb{
    background:rgba(117,215,255,.36);
    border:3px solid rgba(5,8,23,.82);
    border-radius:999px;
  }

  .pageShell{
    position:relative;
    display:block;
    flex:0 0 auto;
    margin:auto;
  }

  .page{
    position:absolute;
    left:0;
    top:0;
    transform-origin:top left;
    background:
      linear-gradient(45deg,rgba(255,255,255,.075) 25%,transparent 25%),
      linear-gradient(-45deg,rgba(255,255,255,.075) 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,rgba(255,255,255,.075) 75%),
      linear-gradient(-45deg,transparent 75%,rgba(255,255,255,.075) 75%);
    background-size:28px 28px;
    background-position:0 0,0 14px,14px -14px,-14px 0;
    background-color:rgba(255,255,255,.025);
    border:1px solid rgba(255,255,255,.20);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
    display:grid;place-items:center;
  }

  .page::after{
    content:attr(data-label);
    position:absolute;left:12px;bottom:10px;
    color:rgba(255,255,255,.45);
    font-size:12px;font-weight:800;
    pointer-events:none;
  }

  canvas{
    max-width:100%;
    max-height:100%;
    display:none;
    touch-action:none;
    image-rendering:auto;
  }
  .hasImage canvas{display:block}

  .empty{
    position:absolute;
    text-align:center;color:#1a2747;
    background:linear-gradient(145deg,#f8fbff,#dfe7f6);
    border-radius:22px;padding:26px;max-width:430px;
    box-shadow:0 26px 70px rgba(0,0,0,.32);
  }
  .hasImage .empty{display:none}
  .empty h1{margin:0 0 8px;font-size:clamp(24px,4vw,42px);letter-spacing:-.05em}
  .empty p{margin:0 auto 18px;color:#435070;line-height:1.35}

  .brushCursor{
    position:fixed;
    width:36px;height:36px;border-radius:999px;
    border:2px solid rgba(125,255,168,.95);
    box-shadow:0 0 0 1px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.35);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:40;
    display:none;
  }
  .brushCursor::after{
    content:"";
    position:absolute;left:50%;top:50%;width:8px;height:8px;
    border-left:1px solid rgba(255,255,255,.85);
    border-top:1px solid rgba(255,255,255,.85);
    transform:translate(-50%,-50%) rotate(45deg);
  }

  .canvasControls{
    position:fixed;right:calc(var(--panelWidth) + 54px);bottom:64px;z-index:30;
    display:flex;gap:8px;padding:8px;border-radius:18px;
    border:1px solid var(--line2);background:rgba(5,8,23,.82);
    backdrop-filter:blur(14px);box-shadow:0 16px 38px rgba(0,0,0,.30);
  }
  .miniBtn{
    min-width:54px;height:48px;border-radius:14px;
    background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.045));
    border:1px solid var(--line);display:grid;place-items:center;
    font-weight:900;font-size:18px;
  }
  .miniBtn span{display:block;font-size:10px;color:var(--muted);line-height:1;font-weight:800}
  .miniBtn.active{border-color:rgba(125,255,168,.55);background:linear-gradient(135deg,rgba(125,255,168,.20),rgba(255,255,255,.06))}
  .canvasStage.handMode{cursor:grab}
  .canvasStage.handMode:active{cursor:grabbing}
  .zoomSelect,.presetSelect{
    height:48px;border-radius:14px;
    background:#202b57;
    border:1px solid rgba(255,255,255,.28);
    color:#ffffff;
    padding:0 12px;
    font-weight:900;
    appearance:auto;
  }

  .zoomSelect option,.presetSelect option{
    background:#111a3f;
    color:#ffffff;
  }

  .status{
    border-top:1px solid var(--line);
    background:rgba(5,8,23,.62);color:var(--muted);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;font-size:12px;
  }

  .panel{
    min-width:0;
    height:100dvh;
    border-left:1px solid var(--line);
    background:rgba(17,26,63,.84);
    backdrop-filter:blur(16px);
    display:grid;
    grid-template-rows:auto minmax(0,1fr);
    overflow:hidden;
    z-index:8;
  }
  .panelHead{padding:18px;border-bottom:1px solid var(--line)}
  .eyebrow{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.12em;font-weight:900}
  .panelHead h2{margin:5px 0 4px;font-size:24px;letter-spacing:-.045em}
  .panelHead p{margin:0;color:var(--muted);font-size:13px;line-height:1.35}
  .panelBody{
    min-height:0;
    overflow-y:scroll;
    padding:16px;
    scrollbar-gutter:stable;
  }

  .panelBody::-webkit-scrollbar{
    width:12px;
  }

  .panelBody::-webkit-scrollbar-track{
    background:rgba(255,255,255,.05);
    border-radius:999px;
  }

  .panelBody::-webkit-scrollbar-thumb{
    background:rgba(117,215,255,.34);
    border:3px solid rgba(17,26,63,.84);
    border-radius:999px;
  }

  .stepCard{
    border:1px solid var(--line);
    background:rgba(255,255,255,.055);
    border-radius:20px;padding:14px;margin-bottom:14px;
  }
  .stepCard.active{border-color:rgba(117,215,255,.42);background:linear-gradient(135deg,rgba(117,215,255,.13),rgba(255,255,255,.045))}
  .stepTitle{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:15px;font-weight:900}
  .stepNum{
    width:26px;height:26px;border-radius:999px;display:grid;place-items:center;
    background:rgba(255,255,255,.10);border:1px solid var(--line);
    color:var(--accent);font-size:12px;
  }

  .toolGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .toolBtn{
    min-height:50px;border-radius:15px;
    background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.045));
    border:1px solid var(--line);font-weight:850;
    display:flex;justify-content:center;align-items:center;gap:7px;text-align:center;
  }
  .toolBtn.full{grid-column:1/-1}
  .toolBtn.primary{background:linear-gradient(135deg,rgba(117,215,255,.28),rgba(185,131,255,.18));border-color:rgba(117,215,255,.45)}
  .toolBtn.active{border-color:rgba(125,255,168,.48);background:linear-gradient(135deg,rgba(125,255,168,.20),rgba(255,255,255,.06))}
  .hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.35}
  .sliderRow{display:grid;gap:7px;margin-top:12px}
  .sliderRow label{color:var(--ink);font-size:12px;font-weight:900;display:flex;justify-content:space-between}
  .sliderRow label span{color:var(--accent);font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:var(--accent)}

  .hiddenFile{position:fixed;left:-1000px;top:-1000px;width:1px;height:1px;opacity:.01}
  .mobileBar,.mobileDrawer{display:none}
  .closeDrawer{display:none}
  .resizeHandle{position:absolute;right:calc(var(--panelWidth) - 6px);top:58px;bottom:44px;width:12px;cursor:col-resize;z-index:9}
  .resizeHandle::after{content:"";position:absolute;top:50%;right:4px;transform:translateY(-50%);width:4px;height:44px;border-radius:999px;background:rgba(255,255,255,.14)}
  body.resizing{user-select:none;cursor:col-resize}

  @media(max-width:820px){
    .app{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) calc(var(--mobileBar) + var(--safeBottom))}
    .rail,.panel,.resizeHandle{display:none}
    .workspace{grid-template-rows:52px minmax(0,1fr) 34px}
    .topbar{padding:0 12px}
    .title strong{font-size:14px}
    .buildBadge{font-size:10px;padding:2px 7px}
    .title span{display:none}
    .topActions .pill:not(.primary){display:none}
    .canvasStage{padding:14px;transition:padding-bottom .22s ease}
    .app.drawerOpen .canvasStage{padding-bottom:calc(var(--drawerHeight) + 24px)}
    .page{border-radius:16px}
    .canvasControls{right:12px;bottom:calc(var(--mobileBar) + var(--safeBottom) + 46px);padding:6px;border-radius:16px}
    .miniBtn{min-width:46px;height:42px;font-size:16px}
    .zoomSelect,.presetSelect{height:42px;max-width:92px}
    .status{padding:0 12px;font-size:11px}
    .mobileBar{
      display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
      padding:8px 10px calc(8px + var(--safeBottom));
      border-top:1px solid var(--line);background:rgba(5,8,23,.94);
      backdrop-filter:blur(16px);z-index:20;
    }
    .mobileStudioBtn{
      height:58px;border-radius:18px;background:rgba(255,255,255,.055);
      border:1px solid var(--line);display:grid;place-items:center;gap:1px;
      font-size:11px;color:var(--muted);font-weight:850;
    }
    .mobileStudioBtn.active{color:var(--ink);border-color:rgba(117,215,255,.46);background:linear-gradient(135deg,rgba(117,215,255,.20),rgba(185,131,255,.12))}
    .mobileStudioBtn .studioIcon{width:30px;height:30px;font-size:17px}
    .mobileDrawer{
      display:block;position:fixed;left:0;right:0;
      bottom:calc(var(--mobileBar) + var(--safeBottom));
      max-height:var(--drawerHeight);
      transform:translateY(calc(100% + var(--mobileBar)));
      transition:transform .22s ease;
      background:rgba(17,26,63,.94);
      border-top:1px solid var(--line2);border-radius:24px 24px 0 0;
      z-index:18;box-shadow:0 -26px 70px rgba(0,0,0,.42);overflow:hidden;
    }
    .mobileDrawer.open{transform:translateY(0)}
    .grab{width:48px;height:5px;border-radius:999px;background:rgba(255,255,255,.24);margin:9px auto 2px}
    .mobileDrawer .panelHead{padding:10px 16px 14px;position:relative}
    .mobileDrawer .panelHead h2{font-size:21px}
    .mobileDrawer .panelBody{
      max-height:calc(var(--drawerHeight) - 98px);
      overflow-y:scroll;
      padding:14px;
    }
    .closeDrawer{display:grid;place-items:center;position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:13px;background:rgba(255,255,255,.07);border:1px solid var(--line)}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="rail">
    <div class="brand">bil</div>
    <nav class="studioBtns" id="desktopStudios"></nav>
  </aside>

  <main class="workspace">
    <header class="topbar">
      <div class="title">
        <div class="titleLine">
          <strong>bill's image lab</strong>
          <span class="buildBadge">Build 6.7</span>
        </div>
        <span id="taskLine">Pan Zoom Fix: wheel zoom, hand pan, and cursor-centered navigation.</span>
      </div>
      <div class="topActions">
        <button class="pill" id="fitBtn">Fit</button>
        <button class="pill" id="clearBtn">Clear</button>
        <button class="pill primary" id="importTopBtn">Import Image</button>
      </div>
    </header>

    <section class="canvasStage" id="canvasStage">
      <div class="pageShell" id="pageShell">
        <div class="page" id="page" data-label="Free Canvas">
          <canvas id="canvas"></canvas>
          <div class="empty">
            <h1>Choose a canvas.</h1>
            <p>The page is now separate from the image. Zoom affects the whole document, not just the character.</p>
            <button class="pill primary" id="importCanvasBtn">Import Image</button>
          </div>
        </div>
      </div>

      <div class="brushCursor" id="brushCursor"></div>

      <div class="canvasControls">
        <button class="miniBtn" id="undoCanvasBtn">↶<span>Undo</span></button>
        <button class="miniBtn" id="redoCanvasBtn">↷<span>Redo</span></button>
        <button class="miniBtn" id="handBtn">✋<span>Pan</span></button>
        <select class="zoomSelect" id="zoomSelect">
          <option value="0.5">50%</option>
          <option value="0.65">65%</option>
          <option value="0.75">75%</option>
          <option value="fit">Fit</option>
          <option value="1">100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
          <option value="3">300%</option>
          <option value="4">400%</option>
        </select>
      </div>
    </section>

    <footer class="status">
      <span id="statusLeft">Extract Studio ready</span>
      <span id="statusRight">No image loaded</span>
    </footer>
  </main>

  <div class="resizeHandle" id="resizeHandle"></div>
  <aside class="panel" id="desktopPanel"></aside>

  <nav class="mobileBar" id="mobileStudios"></nav>
  <section class="mobileDrawer" id="mobileDrawer">
    <div class="grab"></div>
    <div id="mobilePanel"></div>
  </section>
</div>

<input class="hiddenFile" id="fileInput" type="file" accept="image/*,.heic,.HEIC,.heif,.HEIF" />

<script>
(() => {
  const presets = {
    free:{label:"Free Canvas",w:1200,h:800},
    letterP:{label:"Letter Portrait",w:816,h:1056},
    letterL:{label:"Letter Landscape",w:1056,h:816},
    half:{label:"Half Letter",w:816,h:528},
    card:{label:"Index Card",w:600,h:400},
    square:{label:"Square",w:900,h:900}
  };

  const studios = {
    extract:{icon:"🪄",label:"Extract",title:"Extract Studio",summary:"Guided background removal and cleanup."},
    create:{icon:"✏️",label:"Create",title:"Create Studio",summary:"Text, shapes, colors, shadows, and graphic creation."},
    compose:{icon:"🧩",label:"Compose",title:"Compose Studio",summary:"Layers, arranging, aligning, and final artwork."},
    effects:{icon:"🎭",label:"Effects",title:"Effects Studio",summary:"Future parking lot for advanced effects."}
  };

  const state = {
    studio:"extract",
    preset:"free",
    pageW:1200,
    pageH:800,
    imageLoaded:false,
    imageName:"",
    imageRect:null,
    original:null,
    history:[],
    future:[],
    tolerance:34,
    brushSize:18,
    edgeFit:0,
    smoothEdge:0,
    baseRemovalMask:null,
    mode:null,
    painting:false,
    panning:false,
    panStartX:0,
    panStartY:0,
    scrollStartX:0,
    scrollStartY:0,
    zoom:"fit",
    fitScale:1
  };

  const app = document.getElementById("app");
  const desktopStudios = document.getElementById("desktopStudios");
  const mobileStudios = document.getElementById("mobileStudios");
  const desktopPanel = document.getElementById("desktopPanel");
  const mobilePanel = document.getElementById("mobilePanel");
  const mobileDrawer = document.getElementById("mobileDrawer");
  const fileInput = document.getElementById("fileInput");
  const canvasStage = document.getElementById("canvasStage");
  const pageShell = document.getElementById("pageShell");
  const page = document.getElementById("page");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", {willReadFrequently:true});
  const brushCursor = document.getElementById("brushCursor");
  const statusLeft = document.getElementById("statusLeft");
  const statusRight = document.getElementById("statusRight");
  const taskLine = document.getElementById("taskLine");
  const resizeHandle = document.getElementById("resizeHandle");
  const zoomSelect = document.getElementById("zoomSelect");

  function buildStudioButtons(){
    Object.entries(studios).forEach(([key,s])=>{
      const d=document.createElement("button");
      d.className="studioBtn";
      d.dataset.studio=key;
      d.innerHTML=`<span class="studioIcon">${s.icon}</span><span class="tip">${s.title}</span>`;
      desktopStudios.appendChild(d);

      const m=document.createElement("button");
      m.className="mobileStudioBtn";
      m.dataset.studio=key;
      m.innerHTML=`<span class="studioIcon">${s.icon}</span><span>${s.label}</span>`;
      mobileStudios.appendChild(m);
    });
  }

  function panelTemplate(){
    const s=studios[state.studio];

    if(state.studio!=="extract"){
      return `
        <div class="panelHead">
          <button class="closeDrawer" data-action="close">×</button>
          <div class="eyebrow">placeholder</div>
          <h2>${s.title}</h2>
          <p>${s.summary}</p>
        </div>
        <div class="panelBody">
          <div class="stepCard active">
            <div class="stepTitle"><span class="stepNum">•</span> Coming later</div>
            <div class="hint">Build 6.1 focuses on Extract Studio and the document canvas model.</div>
          </div>
        </div>`;
    }

    return `
      <div class="panelHead">
        <button class="closeDrawer" data-action="close">×</button>
        <div class="eyebrow">build 6.7 · pan zoom</div>
        <h2>Extract Studio</h2>
        <p>Document canvas first. Image sits inside the page.</p>
      </div>
      <div class="panelBody">
        <div class="stepCard active">
          <div class="stepTitle"><span class="stepNum">1</span> Canvas size</div>
          <select class="presetSelect" data-action="preset" style="width:100%">
            ${Object.entries(presets).map(([k,p])=>`<option value="${k}" ${state.preset===k?"selected":""}>${p.label}</option>`).join("")}
          </select>
          <div class="hint">Simple sizes for now: Letter, half-letter, index card, square, and free canvas.</div>
        </div>

        <div class="stepCard ${state.imageLoaded?"":"active"}">
          <div class="stepTitle"><span class="stepNum">2</span> Import image</div>
          <button class="toolBtn primary full" data-action="import">Import Image</button>
          <div class="hint">${state.imageLoaded?state.imageName:"Choose a PNG, JPG, or photo from your device."}</div>
        </div>

        <div class="stepCard ${state.imageLoaded?"active":""}">
          <div class="stepTitle"><span class="stepNum">3</span> Remove background</div>
          <div class="toolGrid">
            <button class="toolBtn primary full" data-action="quick-remove">Quick Remove Background</button>
            <button class="toolBtn ${state.mode==="wand"?"active":""}" data-action="wand">Magic Wand</button>
            <button class="toolBtn" data-action="similar-white">Remove Similar White</button>
          </div>
          <div class="sliderRow">
            <label>Tolerance <span data-bind="tol">${state.tolerance}</span></label>
            <input data-action="tolerance" type="range" min="0" max="120" value="${state.tolerance}">
          </div>
          <div class="hint">Quick Remove makes the first cut. Magic Wand stays active for repeated cleanup clicks until you choose another tool or press Escape.</div>
        </div>

        <div class="stepCard ${state.imageLoaded?"active":""}">
          <div class="stepTitle"><span class="stepNum">4</span> Refine edge</div>
          <div class="sliderRow">
            <label>Edge Fit <span data-bind="edge">${state.edgeFit > 0 ? "+"+state.edgeFit : state.edgeFit}</span></label>
            <input data-action="edge-fit" type="range" min="-4" max="8" value="${state.edgeFit}">
          </div>
          <div class="sliderRow">
            <label>Smooth Edge <span data-bind="smooth">${state.smoothEdge}</span></label>
            <input data-action="smooth-edge" type="range" min="0" max="4" value="${state.smoothEdge}">
          </div>
          <div class="hint">Edge Fit tightens or loosens the cutout. Smooth Edge reduces jagged pixels. Best used after Quick Remove.</div>
        </div>

        <div class="stepCard ${state.imageLoaded?"active":""}">
          <div class="stepTitle"><span class="stepNum">5</span> Touch-up</div>
          <div class="toolGrid">
            <button class="toolBtn ${state.mode==="restore"?"active":""}" data-action="brush">Brush Back</button>
            <button class="toolBtn ${state.mode==="erase"?"active":""}" data-action="eraser">Erase Spot</button>
          </div>
          <div class="sliderRow">
            <label>Brush size <span data-bind="brush">${state.brushSize}px</span></label>
            <input data-action="brush-size" type="range" min="3" max="90" value="${state.brushSize}">
          </div>
          <div class="hint">Only use brush cleanup if the sliders cannot finish the edge.</div>
        </div>

        <div class="stepCard ${state.imageLoaded?"active":""}">
          <div class="stepTitle"><span class="stepNum">6</span> Export</div>
          <button class="toolBtn primary full" data-action="export">Export Transparent PNG</button>
        </div>
      </div>`;
  }

  function setPageSize(key){
    const p=presets[key]||presets.free;
    state.preset=key;
    state.pageW=p.w;
    state.pageH=p.h;
    page.style.width=p.w+"px";
    page.style.height=p.h+"px";
    page.dataset.label=p.label;
    if(!state.imageLoaded){
      canvas.width=p.w;
      canvas.height=p.h;
      ctx.clearRect(0,0,p.w,p.h);
    }
    fitPage();
    render();
  }

  function fitPage(){
    const rect=canvasStage.getBoundingClientRect();
    const availableW=Math.max(240,rect.width-80);
    const availableH=Math.max(220,rect.height-80);
    state.fitScale=Math.min(availableW/state.pageW, availableH/state.pageH, 1);
    applyZoom();
    zoomSelect.value="fit";
    requestAnimationFrame(() => {
      canvasStage.scrollLeft = Math.max(0, (canvasStage.scrollWidth - canvasStage.clientWidth) / 2);
      canvasStage.scrollTop = Math.max(0, (canvasStage.scrollHeight - canvasStage.clientHeight) / 2);
    });
  }

  function applyZoom(){
    const z=state.zoom==="fit" ? state.fitScale : Number(state.zoom);

    // Real scroll dimensions live on pageShell.
    // Visual scale lives on page. This prevents the canvas from zooming out of the scroll system.
    pageShell.style.width = `${state.pageW * z}px`;
    pageShell.style.height = `${state.pageH * z}px`;
    page.style.width = state.pageW + "px";
    page.style.height = state.pageH + "px";
    page.style.transform = `scale(${z})`;
  }

  function currentZoomNumber(){
    return state.zoom==="fit" ? state.fitScale : Number(state.zoom);
  }

  function nearestZoomOption(z){
    const options=[0.5,0.65,0.75,1,1.25,1.5,2,3,4];
    let best=options[0];
    let diff=Math.abs(z-best);
    for(const opt of options){
      const d=Math.abs(z-opt);
      if(d<diff){best=opt;diff=d;}
    }
    return String(best);
  }

  function setZoom(value, keepCenter=true){
    state.zoom=value;
    applyZoom();
    zoomSelect.value=value;

    if(keepCenter){
      requestAnimationFrame(() => {
        canvasStage.scrollLeft = Math.max(0, (canvasStage.scrollWidth - canvasStage.clientWidth) / 2);
        canvasStage.scrollTop = Math.max(0, (canvasStage.scrollHeight - canvasStage.clientHeight) / 2);
      });
    }

    statusRight.textContent=value==="fit" ? "Fit page" : `Zoom ${Math.round(Number(value)*100)}%`;
  }

  function zoomAtPoint(nextZoom, clientX, clientY){
    const oldZoom=currentZoomNumber();
    const rect=canvasStage.getBoundingClientRect();

    const localX=clientX-rect.left+canvasStage.scrollLeft;
    const localY=clientY-rect.top+canvasStage.scrollTop;

    state.zoom=String(nextZoom);
    applyZoom();

    const ratio=nextZoom/oldZoom;
    canvasStage.scrollLeft=localX*ratio-(clientX-rect.left);
    canvasStage.scrollTop=localY*ratio-(clientY-rect.top);

    zoomSelect.value=nearestZoomOption(nextZoom);
    statusRight.textContent=`Zoom ${Math.round(nextZoom*100)}%`;
  }

  function render(){
    document.querySelectorAll("[data-studio]").forEach(btn=>btn.classList.toggle("active",btn.dataset.studio===state.studio));
    desktopPanel.innerHTML=panelTemplate();
    mobilePanel.innerHTML=panelTemplate();
    const s=studios[state.studio];
    taskLine.textContent=`${s.title}: ${s.summary}`;
    statusLeft.textContent=state.mode?`Mode: ${state.mode}`:`${s.title} ready`;
    page.classList.toggle("hasImage",state.imageLoaded);
    wireControls();
  }

  function wireControls(){
    document.querySelectorAll("[data-action]").forEach(el=>{
      const a=el.dataset.action;
      if(a==="close") el.onclick=closeDrawer;
      if(a==="preset") el.onchange=e=>setPageSize(e.target.value);
      if(a==="import") el.onclick=openFile;
      if(a==="quick-remove") el.onclick=quickRemove;
      if(a==="wand") el.onclick=()=>setMode(state.mode==="wand"?null:"wand",true);
      if(a==="similar-white") el.onclick=removeSimilarWhite;
      if(a==="brush") el.onclick=()=>setMode(state.mode==="restore"?null:"restore");
      if(a==="eraser") el.onclick=()=>setMode(state.mode==="erase"?null:"erase");
      if(a==="export") el.onclick=exportPNG;
      if(a==="tolerance") el.oninput=e=>{
        state.tolerance=Number(e.target.value);
        document.querySelectorAll("[data-bind='tol']").forEach(x=>x.textContent=state.tolerance);
      };
      if(a==="brush-size") el.oninput=e=>{
        state.brushSize=Number(e.target.value);
        document.querySelectorAll("[data-bind='brush']").forEach(x=>x.textContent=state.brushSize+"px");
        updateBrushCursorSize();
      };
      if(a==="edge-fit") el.oninput=e=>{
        state.edgeFit=Number(e.target.value);
        document.querySelectorAll("[data-bind='edge']").forEach(x=>x.textContent=state.edgeFit>0?"+"+state.edgeFit:state.edgeFit);
        applyEdgeRefinement();
      };
      if(a==="smooth-edge") el.oninput=e=>{
        state.smoothEdge=Number(e.target.value);
        document.querySelectorAll("[data-bind='smooth']").forEach(x=>x.textContent=state.smoothEdge);
        applyEdgeRefinement();
      };
    });
  }

  function selectStudio(key){
    state.studio=key;
    if(key!=="extract") state.mode=null;
    render();
    if(window.matchMedia("(max-width:820px)").matches) openDrawer();
  }

  function openDrawer(){mobileDrawer.classList.add("open");app.classList.add("drawerOpen")}
  function closeDrawer(){mobileDrawer.classList.remove("open");app.classList.remove("drawerOpen")}
  function openFile(){fileInput.value="";fileInput.click()}

  function setMode(mode, close=false){
    if(!state.imageLoaded && mode && mode!=="hand"){statusRight.textContent="Import an image first";return}
    state.mode=mode;
    if(mode==="wand") statusRight.textContent="Magic Wand: keep clicking areas to remove";
    else if(mode==="restore") statusRight.textContent="Brush Back active";
    else if(mode==="erase") statusRight.textContent="Erase Spot active";
    else if(mode==="hand") statusRight.textContent="Pan mode active";
    else statusRight.textContent=state.imageLoaded?state.imageName:"No image loaded";
    updateBrushCursorVisibility(false);
    if(close) closeDrawer();
    render();
  }

  function pushHistory(){
    if(!state.imageLoaded)return;
    state.history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
    if(state.history.length>25)state.history.shift();
    state.future=[];
  }

  function undo(){
    if(!state.history.length||!state.imageLoaded)return;
    state.future.push(ctx.getImageData(0,0,canvas.width,canvas.height));
    ctx.putImageData(state.history.pop(),0,0);
    statusRight.textContent="Undo";
  }

  function redo(){
    if(!state.future.length||!state.imageLoaded)return;
    state.history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
    ctx.putImageData(state.future.pop(),0,0);
    statusRight.textContent="Redo";
  }

  function loadFile(file){
    if(!file)return;
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      canvas.width=state.pageW;
      canvas.height=state.pageH;
      ctx.clearRect(0,0,state.pageW,state.pageH);

      const pad=Math.round(Math.min(state.pageW,state.pageH)*0.12);
      const maxW=state.pageW-pad*2;
      const maxH=state.pageH-pad*2;
      const scale=Math.min(maxW/img.naturalWidth,maxH/img.naturalHeight,1);
      const w=Math.round(img.naturalWidth*scale);
      const h=Math.round(img.naturalHeight*scale);
      const x=Math.round((state.pageW-w)/2);
      const y=Math.round((state.pageH-h)/2);
      ctx.drawImage(img,x,y,w,h);

      state.imageRect = { x, y, w, h };
      state.original=ctx.getImageData(0,0,canvas.width,canvas.height);
      state.imageLoaded=true;
      state.imageName=file.name;
      state.history=[];
      state.future=[];
      state.baseRemovalMask=null;
      state.edgeFit=0;
      state.smoothEdge=0;
      state.mode=null;
      statusRight.textContent=file.name;
      URL.revokeObjectURL(url);
      closeDrawer();
      fitPage();
      render();
    };
    img.onerror=()=>{statusRight.textContent="Image could not load";URL.revokeObjectURL(url)};
    img.src=url;
  }

  function clearCanvas(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    state.imageLoaded=false;
    state.imageName="";
    state.imageRect=null;
    state.original=null;
    state.history=[];
    state.future=[];
    state.baseRemovalMask=null;
    state.edgeFit=0;
    state.smoothEdge=0;
    state.mode=null;
    statusRight.textContent="No image loaded";
    render();
  }

  function getPoint(e){
    const rect=canvas.getBoundingClientRect();
    const x=Math.floor((e.clientX-rect.left)*canvas.width/rect.width);
    const y=Math.floor((e.clientY-rect.top)*canvas.height/rect.height);
    if(x<0||y<0||x>=canvas.width||y>=canvas.height)return null;
    return {x,y};
  }

  function threshold(){return Math.max(1,state.tolerance)*Math.max(1,state.tolerance)*3}
  function distOk(data,i,sample,tol2){
    if(data[i+3]===0)return false;
    const dr=data[i]-sample[0],dg=data[i+1]-sample[1],db=data[i+2]-sample[2];
    return dr*dr+dg*dg+db*db<=tol2;
  }

  function connectedSelection(sx,sy,sample){
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=img.data,w=canvas.width,h=canvas.height;
    const sel=new Uint8Array(w*h),seen=new Uint8Array(w*h),stack=[[sx,sy]];
    const tol2=threshold();let count=0;
    while(stack.length){
      const [x,y]=stack.pop();
      if(x<0||y<0||x>=w||y>=h)continue;
      const idx=y*w+x;
      if(seen[idx])continue;
      seen[idx]=1;
      if(distOk(data,idx*4,sample,tol2)){
        sel[idx]=1;count++;
        stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
      }
    }
    return {sel,count};
  }

  function applySelection(sel){
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=img.data;let removed=0;
    for(let i=0;i<sel.length;i++){
      if(sel[i]){data[i*4+3]=0;removed++}
    }
    ctx.putImageData(img,0,0);
    return removed;
  }


  function ensureBaseMask(){
    if(!state.baseRemovalMask){
      state.baseRemovalMask = new Uint8Array(canvas.width * canvas.height);
    }
    return state.baseRemovalMask;
  }

  function addToBaseMask(mask){
    const base = ensureBaseMask();
    for(let i=0;i<mask.length;i++){
      if(mask[i]) base[i] = 1;
    }
  }

  function applyCurrentBaseMask(){
    if(!state.baseRemovalMask) return;
    const w=canvas.width;
    const h=canvas.height;
    let mask = cloneMask(state.baseRemovalMask);

    if(state.edgeFit>0) mask=dilateMask(mask,w,h,state.edgeFit);
    if(state.edgeFit<0) mask=erodeMask(mask,w,h,Math.abs(state.edgeFit));
    if(state.smoothEdge>0) mask=smoothMask(mask,w,h,state.smoothEdge);

    restoreOriginalThenApplyMask(mask);
  }

  function cloneMask(mask){
    return mask ? new Uint8Array(mask) : null;
  }

  function dilateMask(mask,w,h,iterations){
    let current=cloneMask(mask);
    for(let n=0;n<iterations;n++){
      const next=new Uint8Array(current);
      for(let y=1;y<h-1;y++){
        for(let x=1;x<w-1;x++){
          const i=y*w+x;
          if(current[i]) continue;
          if(current[i-1]||current[i+1]||current[i-w]||current[i+w]) next[i]=1;
        }
      }
      current=next;
    }
    return current;
  }

  function erodeMask(mask,w,h,iterations){
    let current=cloneMask(mask);
    for(let n=0;n<iterations;n++){
      const next=new Uint8Array(current);
      for(let y=1;y<h-1;y++){
        for(let x=1;x<w-1;x++){
          const i=y*w+x;
          if(!current[i]) continue;
          if(!current[i-1]||!current[i+1]||!current[i-w]||!current[i+w]) next[i]=0;
        }
      }
      current=next;
    }
    return current;
  }

  function smoothMask(mask,w,h,iterations){
    let current=cloneMask(mask);
    for(let n=0;n<iterations;n++){
      const next=new Uint8Array(current);
      for(let y=1;y<h-1;y++){
        for(let x=1;x<w-1;x++){
          const i=y*w+x;
          let neighbors=0;
          neighbors+=current[i-1]+current[i+1]+current[i-w]+current[i+w];
          neighbors+=current[i-w-1]+current[i-w+1]+current[i+w-1]+current[i+w+1];
          if(current[i]&&neighbors<=2) next[i]=0;
          else if(!current[i]&&neighbors>=6) next[i]=1;
        }
      }
      current=next;
    }
    return current;
  }

  function restoreOriginalThenApplyMask(mask){
    if(!state.original||!mask) return;
    ctx.putImageData(state.original,0,0);
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const d=img.data;
    for(let i=0;i<mask.length;i++){
      if(mask[i]) d[i*4+3]=0;
    }
    ctx.putImageData(img,0,0);
  }

  function applyEdgeRefinement(){
    if(!state.imageLoaded||!state.baseRemovalMask){
      statusRight.textContent="Run Quick Remove first";
      return;
    }
    applyCurrentBaseMask();
    const edgeText=state.edgeFit>0?`+${state.edgeFit}`:`${state.edgeFit}`;
    statusRight.textContent=`Edge Fit ${edgeText}, Smooth ${state.smoothEdge}`;
  }

  function quickRemove(){
    if(!state.imageLoaded){
      statusRight.textContent="Import an image first";
      return;
    }

    pushHistory();

    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=img.data;
    const pageW=canvas.width;
    const pageH=canvas.height;

    const rect = state.imageRect || {x:0,y:0,w:pageW,h:pageH};
    const x0 = Math.max(0, rect.x);
    const y0 = Math.max(0, rect.y);
    const x1 = Math.min(pageW - 1, rect.x + rect.w - 1);
    const y1 = Math.min(pageH - 1, rect.y + rect.h - 1);
    const midX = Math.round((x0 + x1) / 2);
    const midY = Math.round((y0 + y1) / 2);

    // Sample the imported image boundary, not the larger document/page boundary.
    // This restores the cleaner Build 6 behavior while keeping page presets.
    const starts=[
      [x0,y0],[x1,y0],[x0,y1],[x1,y1],
      [midX,y0],[midX,y1],[x0,midY],[x1,midY]
    ];

    const combined=new Uint8Array(pageW*pageH);
    let total=0;

    starts.forEach(([x,y])=>{
      const p=(y*pageW+x)*4;
      const sample=[data[p],data[p+1],data[p+2],data[p+3]];

      if(sample[3] === 0) return;

      const result=connectedSelection(x,y,sample);
      for(let i=0;i<result.sel.length;i++){
        if(result.sel[i]&&!combined[i]){
          combined[i]=1;
          total++;
        }
      }
    });

    state.baseRemovalMask=new Uint8Array(combined);
    state.edgeFit=0;
    state.smoothEdge=0;
    applyCurrentBaseMask();
    state.mode=null;
    statusRight.textContent=`Quick removed ${Math.round(total/(pageW*pageH)*100)}%`;
    closeDrawer();
    render();
  }

  function magicWandAt(e){
    if(!state.imageLoaded||state.mode!=="wand")return;
    const p=getPoint(e);if(!p)return;
    const one=ctx.getImageData(p.x,p.y,1,1).data;
    const result=connectedSelection(p.x,p.y,[one[0],one[1],one[2],one[3]]);
    pushHistory();
    addToBaseMask(result.sel);
    applyCurrentBaseMask();
    statusRight.textContent=`Magic Wand added ${Math.round(result.count/(canvas.width*canvas.height)*100)}% — keep clicking or choose another tool`;
    render();
  }

  function removeSimilarWhite(){
    if(!state.imageLoaded){statusRight.textContent="Import an image first";return}
    pushHistory();
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const d=img.data;
    const tol=Math.max(8,state.tolerance*2.2);
    let removed=0;
    for(let i=0;i<d.length;i+=4){
      const dr=255-d[i],dg=255-d[i+1],db=255-d[i+2];
      const distance=Math.sqrt(dr*dr+dg*dg+db*db);
      const neutral=Math.abs(d[i]-d[i+1])<18&&Math.abs(d[i+1]-d[i+2])<18;
      if(d[i+3]>0&&distance<=tol&&neutral){d[i+3]=0;removed++}
    }
    const simMask = new Uint8Array(canvas.width * canvas.height);
    for(let j=0;j<d.length;j+=4){
      if(d[j+3] === 0) simMask[j/4] = 1;
    }
    addToBaseMask(simMask);
    applyCurrentBaseMask();
    statusRight.textContent=`Similar white added ${Math.round(removed/(canvas.width*canvas.height)*100)}% to mask`;
  }

  function paintAt(e){
    if(!state.imageLoaded||(state.mode!=="restore"&&state.mode!=="erase"))return;
    const p=getPoint(e);if(!p)return;
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=img.data,original=state.original?state.original.data:null;
    const r=state.brushSize,r2=r*r;
    for(let y=Math.max(0,p.y-r);y<=Math.min(canvas.height-1,p.y+r);y++){
      for(let x=Math.max(0,p.x-r);x<=Math.min(canvas.width-1,p.x+r);x++){
        const dx=x-p.x,dy=y-p.y;
        if(dx*dx+dy*dy>r2)continue;
        const idx=(y*canvas.width+x)*4;
        if(state.mode==="erase"){data[idx+3]=0}
        else if(state.mode==="restore"&&original){
          data[idx]=original[idx];data[idx+1]=original[idx+1];data[idx+2]=original[idx+2];data[idx+3]=original[idx+3];
        }
      }
    }
    ctx.putImageData(img,0,0);
  }

  function exportPNG(){
    if(!state.imageLoaded){statusRight.textContent="Import an image first";return}
    const a=document.createElement("a");
    const base=state.imageName?state.imageName.replace(/\.[^.]+$/,""):"image-lab-export";
    a.download=`${base}-transparent.png`;
    a.href=canvas.toDataURL("image/png");
    a.click();
    statusRight.textContent="Transparent PNG exported";
  }

  function updateBrushCursorSize(){
    const scale=state.zoom==="fit"?state.fitScale:Number(state.zoom);
    const size=Math.max(8,state.brushSize*2*scale);
    brushCursor.style.width=size+"px";
    brushCursor.style.height=size+"px";
  }

  function updateBrushCursorVisibility(show,e){
    const active=state.mode==="restore"||state.mode==="erase";
    if(show&&active&&e){
      updateBrushCursorSize();
      brushCursor.style.left=e.clientX+"px";
      brushCursor.style.top=e.clientY+"px";
      brushCursor.style.display="block";
    }else{
      brushCursor.style.display="none";
    }
  }

  function setupEvents(){
    document.addEventListener("click",e=>{
      const studio=e.target.closest("[data-studio]");
      if(studio)selectStudio(studio.dataset.studio);
    });

    document.getElementById("importTopBtn").onclick=openFile;
    document.getElementById("importCanvasBtn").onclick=openFile;
    document.getElementById("clearBtn").onclick=clearCanvas;
    document.getElementById("fitBtn").onclick=fitPage;
    document.getElementById("undoCanvasBtn").onclick=undo;
    document.getElementById("redoCanvasBtn").onclick=redo;
    const handBtn=document.getElementById("handBtn");
    handBtn.onclick=()=>{
      setMode(state.mode==="hand"?null:"hand");
      handBtn.classList.toggle("active", state.mode==="hand");
      canvasStage.classList.toggle("handMode", state.mode==="hand");
    };
    zoomSelect.onchange=e=>setZoom(e.target.value);
    fileInput.onchange=e=>loadFile(e.target.files[0]);

    canvas.addEventListener("pointerdown",e=>{
      if(state.mode==="wand"){magicWandAt(e);return}
      if(state.mode==="restore"||state.mode==="erase"){
        state.painting=true;
        pushHistory();
        paintAt(e);
        updateBrushCursorVisibility(true,e);
        try{canvas.setPointerCapture(e.pointerId)}catch{}
      }
    });

    canvas.addEventListener("pointermove",e=>{
      updateBrushCursorVisibility(true,e);
      if(state.painting)paintAt(e);
    });

    canvas.addEventListener("pointerenter",e=>updateBrushCursorVisibility(true,e));
    canvas.addEventListener("pointerleave",()=>updateBrushCursorVisibility(false));
    canvas.addEventListener("pointerup",e=>{
      state.painting=false;
      try{canvas.releasePointerCapture(e.pointerId)}catch{}
    });
    canvas.addEventListener("pointercancel",()=>state.painting=false);

    canvasStage.addEventListener("wheel", e=>{
      e.preventDefault();

      if(e.ctrlKey || e.metaKey){
        const current=currentZoomNumber();
        const direction=e.deltaY<0 ? 1 : -1;
        const factor=direction>0 ? 1.12 : 0.88;
        const next=Math.max(0.25, Math.min(5, current*factor));
        zoomAtPoint(next,e.clientX,e.clientY);
        return;
      }

      if(e.shiftKey){
        canvasStage.scrollLeft += e.deltaY;
      }else{
        canvasStage.scrollTop += e.deltaY;
        canvasStage.scrollLeft += e.deltaX;
      }
    }, {passive:false});

    canvasStage.addEventListener("pointerdown", e=>{
      if(state.mode!=="hand") return;
      state.panning=true;
      state.panStartX=e.clientX;
      state.panStartY=e.clientY;
      state.scrollStartX=canvasStage.scrollLeft;
      state.scrollStartY=canvasStage.scrollTop;
      canvasStage.setPointerCapture(e.pointerId);
    });

    canvasStage.addEventListener("pointermove", e=>{
      if(!state.panning) return;
      canvasStage.scrollLeft=state.scrollStartX-(e.clientX-state.panStartX);
      canvasStage.scrollTop=state.scrollStartY-(e.clientY-state.panStartY);
    });

    canvasStage.addEventListener("pointerup", e=>{
      state.panning=false;
      try{canvasStage.releasePointerCapture(e.pointerId)}catch{}
    });

    document.addEventListener("keydown",e=>{
      if(e.key==="Escape"){
        state.mode=null;
        canvasStage.classList.remove("handMode");
        const handBtn=document.getElementById("handBtn");
        if(handBtn) handBtn.classList.remove("active");
        closeDrawer();
        render();
      }
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();undo()}
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="y"){e.preventDefault();redo()}
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="o"){e.preventDefault();openFile()}
    });

    window.addEventListener("resize",()=>{if(state.zoom==="fit")fitPage()});

    let startX=0,startWidth=0;
    resizeHandle.addEventListener("pointerdown",e=>{
      startX=e.clientX;
      startWidth=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--panelWidth"),10);
      document.body.classList.add("resizing");
      resizeHandle.setPointerCapture(e.pointerId);
    });
    resizeHandle.addEventListener("pointermove",e=>{
      if(!document.body.classList.contains("resizing"))return;
      const delta=startX-e.clientX;
      const next=Math.max(300,Math.min(560,startWidth+delta));
      document.documentElement.style.setProperty("--panelWidth",`${next}px`);
      if(state.zoom==="fit")fitPage();
    });
    resizeHandle.addEventListener("pointerup",e=>{
      document.body.classList.remove("resizing");
      try{resizeHandle.releasePointerCapture(e.pointerId)}catch{}
    });
  }

  buildStudioButtons();
  setupEvents();
  setPageSize("free");
})();
</script>
</body>
</html>
